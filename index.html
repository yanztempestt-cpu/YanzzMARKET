<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YANZZ MARKET</title>

<style>
:root{
  --bg:#050816;
  --neon:#00ff9c;
  --neon2:#00e1ff;
  --text:#e6f1ff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,Arial;
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(0,255,156,.15), transparent),
    radial-gradient(900px 500px at 100% 10%, rgba(0,225,255,.12), transparent),
    linear-gradient(180deg,#04060f,#050816 40%,#04060f);
  overflow-x:hidden;
}

.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:420px;
  background:rgba(10,14,30,.85);
  border:1px solid rgba(0,255,156,.2);
  border-radius:18px;
  padding:22px;
  backdrop-filter: blur(10px);
  box-shadow:0 0 40px rgba(0,255,156,.15);
  animation:fadeIn .6s ease;
}

h1{
  margin:0 0 10px;
  font-size:26px;
  text-align:center;
  letter-spacing:1px;
  color:#fff;
  text-shadow:0 0 12px var(--neon);
}

.sub{opacity:.8;font-size:13px;text-align:center;margin-bottom:14px}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#0d1228;
  color:white;
}

.btn{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,var(--neon),var(--neon2));
  color:#001b14;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 12px rgba(0,255,156,.6);
}

.btn.alt{
  background:#0d1228;
  color:#fff;
  border:1px solid rgba(0,255,156,.3);
}

.hidden{display:none}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.tag{
  text-align:center;
  margin-top:8px;
  font-size:12px;
  opacity:.7;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  background:rgba(0,255,156,.15);
  border:1px solid rgba(0,255,156,.3);
  font-size:12px;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>
<div class="wrap">

<div class="card" id="loginBox">
<h1>YANZZ MARKET ⚓</h1>
<div class="sub">Login untuk akses menu</div>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button class="btn" onclick="login()">Masuk</button>

<div class="tag">Member / Owner only</div>
</div>

<div class="card hidden" id="menuBox">
<h1>YANZZ MARKET ⚓</h1>

<div class="row">
<button class="btn alt" onclick="joinWA()">Join Channel</button>
<button class="btn alt" onclick="joinGrup()">Join Grup</button>
</div>

<button class="btn" onclick="reward()">OPEN REWARD</button>

<div class="row">
<button class="btn alt" onclick="msg('BG MAU ORDER FILE MINTA LIST')">FILE</button>
<button class="btn alt" onclick="msg('BG MAU ORDER PANEL MINTA')">PANEL</button>
</div>

<button class="btn alt" onclick="msg('BG MAU BUY KEBUTUHAN DIGITAL')">WEB & APK</button>
<button class="btn" onclick="order()">ORDER KE WA</button>

<div class="tag"><span class="badge">Member Mode</span></div>
</div>

<div class="card hidden" id="adminBox">
<h1>ADMIN PANEL 🔒</h1>

<button class="btn alt" onclick="alert('Edit menu coming soon')">Edit Menu</button>
<button class="btn alt" onclick="alert('Broadcast coming soon')">Broadcast</button>
<button class="btn" onclick="logout()">Logout</button>

<div class="tag"><span class="badge">Owner Mode</span></div>
</div>

</div>

<script>
let j1=false, j2=false;

function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

if(u==="YanzzMEMBER" && p==="12345678"){
loginBox.classList.add("hidden");
menuBox.classList.remove("hidden");
}
else if(u==="OWNER_YANZZ" && p==="27051210#$+-"){
loginBox.classList.add("hidden");
adminBox.classList.remove("hidden");
}
else{
alert("Login salah!");
}
}

function joinWA(){
j1=true;
window.open("https://whatsapp.com/channel/0029VbCWWN96rsQsfLC0B71f");
}

function joinGrup(){
j2=true;
window.open("https://chat.whatsapp.com/HZJVWkSLsECBV7f1S4FpxN");
}

function reward(){
if(j1 && j2){
alert("Reward terbuka 😈");
}else{
alert("Join dulu semua!");
}
}

function order(){
window.open("https://wa.me/6282164463311");
}

function msg(t){
window.open("https://wa.me/6282164463311?text="+encodeURIComponent(t));
}

function logout(){
location.reload();
}
</script>

</body>
  </html>
