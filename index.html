<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YANNZ STORE ⚓</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  background-size: cover;
  overflow-x: hidden;
}

/* splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  font-size: 25px;
  animation: fadeOut 2s forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
  z-index: -1;
}

/* navbar */
.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.8);
  padding: 12px;
  box-shadow: 0 0 10px purple;
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-weight: bold;
}

/* page */
.page {
  display: none;
  padding: 20px;
}
.active { display: block; }

/* card */
.card {
  background: rgba(255,255,255,0.08);
  margin: 10px 0;
  padding: 15px;
  border-radius: 15px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 15px rgba(128,0,255,0.6);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* button */
.main {
  padding: 10px;
  border: none;
  background: linear-gradient(45deg, #7b00ff, #00c3ff);
  color: white;
  border-radius: 10px;
  box-shadow: 0 0 10px purple;
}

/* input */
input {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

/* title glow */
.title {
  text-align: center;
  text-shadow: 0 0 10px purple;
}
</style>
</head>

<body>

<div id="splash">⚓ YANNZ STORE ⚓</div>
<div class="overlay"></div>

<!-- NAV -->
<div class="nav">
  <button onclick="showPage('home')">HOME</button>
  <button onclick="showPage('list')">OPEN LIST</button>
  <button onclick="showPage('admin')">ADMIN</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h2 class="title">YANNZ STORE ⚓</h2>
  <div id="products"></div>
</div>

<!-- LIST -->
<div id="list" class="page">
  <h2 class="title">OPEN LIST</h2>

  <div class="card">
<pre style="white-space: pre-wrap; font-size:12px;">
WTS KEBUTUHAN DIGITAL BY YANNZ⚓

TOP UP ALL GAME
ML / FF / DLL

FILE & PANEL TERSEDIA
HARGA MULAI 2K - 50K+

WEB & APK
• APK
• WEB
• JASA DIGITAL

RESELLER OPEN 🔥
TANYA ADMIN UNTUK FULL LIST
</pre>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2 class="title">ADMIN PANEL</h2>

  <input id="name" placeholder="Nama Produk">
  <input id="price" placeholder="Harga">
  <input id="stock" placeholder="Stok">
  <button class="main" onclick="addProduct()">Tambah Produk</button>

  <hr>

  <input id="bg" placeholder="Link Background (gambar kamu)">
  <button class="main" onclick="setBG()">Ganti Background</button>
</div>

<script>
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// data
let products = JSON.parse(localStorage.getItem("products") || "[]");

// render
function render(){
  let el = document.getElementById("products");
  el.innerHTML = "";

  products.forEach(p=>{
    el.innerHTML += `
    <div class="card">
      <h3>${p.name}</h3>
      <p>💰 ${p.price}</p>
      <p>📦 Stok: ${p.stock}</p>
      <button class="main" onclick="order('${p.name}','${p.price}')">BELI</button>
    </div>`;
  });

  localStorage.setItem("products", JSON.stringify(products));
}

// tambah
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let stock = document.getElementById("stock").value;

  products.push({name, price, stock});
  render();
}

// order
function order(name, price){
  let text = `Halo BG, saya mau order:\n\nProduk: ${name}\nHarga: ${price}`;
  window.open(`https://wa.me/628XXXXXXXXXX?text=${encodeURIComponent(text)}`);
}

// bg
function setBG(){
  let bg = document.getElementById("bg").value;
  document.body.style.backgroundImage = `url(${bg})`;
  localStorage.setItem("bg", bg);
}

// load bg
if(localStorage.getItem("bg")){
  document.body.style.backgroundImage = `url(${localStorage.getItem("bg")})`;
}

render();
</script>

</body>
  </html>
