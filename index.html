<script>

// ===== WA LINK (WAJIB EDIT) =====
const WA_CHANNEL = "https://whatsapp.com/channel/XXXX";
const WA_GROUP = "https://chat.whatsapp.com/XXXX";
const ADMIN_PASS = "admin123";

// ===== JOIN SYSTEM =====
function joinWA(type){
 if(type==="channel") window.open(WA_CHANNEL);
 else window.open(WA_GROUP);
}

function confirmJoin(){
 let name = prompt("Masukkan nama kamu:");
 if(!name) return;

 localStorage.setItem("user", name);
 localStorage.setItem("joined", "true");

 alert("✅ Join berhasil! Reward aktif");
 showPage("home");
}

// cek join
if(localStorage.getItem("joined")){
 document.getElementById("joinPage").style.display="none";
 showPage("home");
}

// ===== ADMIN LOGIN =====
function loginAdmin(){
 let pass = document.getElementById("adminPass").value;
 if(pass === ADMIN_PASS){
  showPage("adminPanel");
 }else{
  alert("Password salah!");
 }
}

// ===== NAV =====
function showPage(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// ===== DATA =====
let products = JSON.parse(localStorage.getItem("products")||"[]");
let editIndex = -1;

// ===== RENDER =====
function render(list=products){
 let el=document.getElementById("products");
 el.innerHTML="";

 list.forEach((p,i)=>{
  el.innerHTML+=`
  <div class="card">
   <h3>${p.name}</h3>
   <small>${p.label||""}</small>
   <p>💰 ${p.price}</p>
   <p>📦 ${p.stock}</p>
   <button class="btn" onclick="order('${p.name}','${p.price}')">ORDER</button>
   <button onclick="edit(${i})">✏️</button>
   <button onclick="del(${i})">🗑️</button>
  </div>`;
 });

 localStorage.setItem("products",JSON.stringify(products));
}

// ===== CRUD =====
function saveProduct(){
 let name=val("name");
 let price=val("price");
 let stock=val("stock");
 let label=val("label");

 if(editIndex>-1){
  products[editIndex]={name,price,stock,label};
  editIndex=-1;
 }else{
  products.push({name,price,stock,label});
 }

 render();
}

function edit(i){
 let p=products[i];
 setVal("name",p.name);
 setVal("price",p.price);
 setVal("stock",p.stock);
 setVal("label",p.label);
 editIndex=i;
}

function del(i){
 products.splice(i,1);
 render();
}

// ===== SEARCH =====
function search(q){
 q=q.toLowerCase();
 render(products.filter(p=>p.name.toLowerCase().includes(q)));
}

 window.open(`https://wa.me/628XXXXXXXXXX?text=${encodeURIComponent(text)}`);
}

// ===== BG =====
function setBG(){
 let bg=val("bg");
 document.body.style.background=`url(${bg}) center/cover`;
 localStorage.setItem("bg",bg);
}

if(localStorage.getItem("bg")){
 document.body.style.background=`url(${localStorage.getItem("bg")}) center/cover`;
}
